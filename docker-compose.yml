services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./configs:/app/configs:ro
      - ./datasets:/app/datasets:ro
      - ./logs:/app/logs
      - ./results:/app/results
      - ./reports:/app/reports
    command: >
      uvicorn githubbench_delta.api.app:create_app
      --factory --host 0.0.0.0 --port 8000

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs:ro
      - ./datasets:/app/datasets:ro
      - ./tests:/app/tests
      - ./logs:/app/logs
      - ./results:/app/results
      - ./reports:/app/reports
    command: >
      uvicorn githubbench_delta.api.app:create_app
      --factory --host 0.0.0.0 --port 8000 --reload
